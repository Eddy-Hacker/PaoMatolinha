<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Venda - Pão Matolinha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script defer src="venda.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <h1>Pão Matolinha</h1>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="venda.html" class="active">Venda</a></li>
                    <li><a href="lista.html">Lista das Vendas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <h2>Registrar Venda</h2>
        <form id="formVenda" class="card">
            <label for="cliente">Cliente:</label>
            <input type="text" id="cliente" required placeholder="Nome do cliente">

            <label for="quantidade">Quantidade de pães:</label>
            <input type="number" id="quantidade" required min="1">

            <label for="preco">Preço por unidade (MZN):</label>
            <input type="number" id="preco" required min="1">

            <button type="submit">Registrar</button>
        </form>
    </main>

    <footer class="footer">
        <p>Transporte & Logística D'Vici Benzas</p>
    </footer>
</body>
</html>
